<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealPulse - Products</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/products.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav>
            <div class="logo">DealPulse</div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="#">Compare</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>

    <!-- Products Page -->
    <main class="products-page">

        <!-- Filters Sidebar -->
        <aside class="filters">

            <h2>Filters</h2>

            <!-- Categories -->
            <div class="filter-group">
                <h3>Categories</h3>

                <label>
                    <input type="checkbox" value="Electronics" class="category-filter">
                    Electronics
                </label>

                <label>
                    <input type="checkbox" value="Fashion" class="category-filter">
                    Fashion
                </label>

                <label>
                    <input type="checkbox" value="Books" class="category-filter">
                    Books
                </label>

                <label>
                    <input type="checkbox" value="Home" class="category-filter">
                    Home
                </label>
            </div>

            <!-- Price -->
            <div class="filter-group">
                <h3>Price Range</h3>

                <input
                    type="range"
                    min="0"
                    max="50000"
                    value="50000"
                >

                <p>₹0 - ₹50,000</p>
            </div>

            <!-- Rating -->
            <div class="filter-group">
                <h3>Rating</h3>

                <label>
                    <input type="radio" name="rating">
                    4★ & Above
                </label>

                <label>
                    <input type="radio" name="rating">
                    3★ & Above
                </label>
            </div>

        </aside>

        <!-- Products Section -->
        <section class="products-section">

            <!-- Search + Sort -->
            <div class="top-bar">

                <input
                    type="text"
                    placeholder="Search products..."
                    class="search-box"
                    id="searchInput"
                >

                <select class="sort-dropdown" id="sortDropdown">
    <option value="">Sort By</option>
    <option value="low-high">Price Low to High</option>
    <option value="high-low">Price High to Low</option>
    <option value="rating">Highest Rated</option>
</select>

            </div>

            <!-- Product Grid -->
            <div class="product-grid" id="productGrid"></div>

        </section>

    </main>

    <script src="data/products.js"></script>
    <script src="js/products.js"></script>


</body>
</html>
