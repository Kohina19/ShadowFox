<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
    name="description"
    content="Complete your order by providing shipping details and reviewing your purchase."
>
    <title>Checkout | DealPulse</title>
    <meta
    name="description"
    content="Secure checkout page for completing your order on DealPulse."
>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav>
            <div class="logo">DealPulse</div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="wishlist.html" id="wishlistLink">Wishlist</a></li>
                <li><a href="compare.html">Compare</a></li>
                <li><a href="cart.html" id="cartLink">Cart</a></li>
                
            </ul>
        </nav>
    </header>

    <!-- Checkout Section -->
    <main class="checkout-page">

        <h1>Checkout</h1>

        <div class="checkout-container">

            <!-- Customer Details -->
            <div class="checkout-form">

                <h2>Customer Information</h2>

                <form id="checkoutForm">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input
                            type="text"
                            placeholder="Enter your name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input
                            type="email"
                            placeholder="Enter your email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input
                            type="tel"
                            placeholder="Phone Number"
    pattern="[0-9]{10}"
    maxlength="10"
                            required
                        >
                    </div>

                    <div class="form-group">
    <label>House / Flat No.</label>
    <input
        type="text"
        placeholder="House No., Apartment"
        required
    >
</div>

<div class="form-group">
    <label>Street / Area</label>
    <input
        type="text"
        placeholder="Street, Area, Landmark"
        required
    >
</div>

                    <div class="form-row">

                        <div class="form-group">
                            <label>City</label>
                            <input
                                type="text"
                                placeholder="City"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label>State</label>
                            <input
                                type="text"
                                placeholder="State"
                                required
                            >
                        </div>

                    </div>

                    <div class="form-group">
                        <label>Pincode</label>
                        <input
                            type="text"
                            placeholder="Pincode"
                            pattern="[0-9]{6}"
    maxlength="6"
                            required
                        >
                    </div>
                    <h3>Payment Method</h3>

<div class="payment-methods">

    <label>
        <input
            type="radio"
            name="payment"
            value="cod"
            checked
        >
        Cash on Delivery
    </label>

    <label>
        <input
            type="radio"
            name="payment"
            value="upi"
        >
        UPI
    </label>

    <label>
        <input
            type="radio"
            name="payment"
            value="card"
        >
        Credit / Debit Card
    </label>

</div>
                    <button
                        type="submit"
                        class="place-order-btn"
                    >
                        Place Order
                    </button>

                </form>

            </div>

            <!-- Order Summary -->
            <div class="order-summary">

                <h2>Order Summary</h2>

                <div id="orderItems">
                    <!-- JS will load products here -->
                </div>

                <hr>

                <p id="subtotal">
    Subtotal: ₹0
</p>

<p>
    Delivery: ₹49
</p>

<h3 id="orderTotal">
    Total: ₹0
</h3>

            </div>

        </div>

    </main>
    <script src="js/navbar.js"></script>
    <script src="js/checkout.js"></script>

</body>
</html>
